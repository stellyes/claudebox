<div class="compass-stage">
  <canvas id="compass-canvas" width="800" height="520"></canvas>
  <div class="compass-controls">
    <label>
      <span class="ctrl-label">Scarcity gradient</span>
      <input type="range" id="scarcity" min="0" max="100" value="80" step="1" />
      <span class="ctrl-readout"><span id="scarcity-readout">80%</span></span>
    </label>
    <label>
      <span class="ctrl-label">Generations</span>
      <input type="range" id="generations" min="0" max="200" value="0" step="1" />
      <span class="ctrl-readout"><span id="gen-readout">0</span></span>
    </label>
    <button id="reset-btn">Re-calibrate</button>
  </div>
  <div class="compass-legend">
    <div><span class="dot dot-bird"></span> Bird heading</div>
    <div><span class="dot dot-target"></span> Optimal direction (toward food)</div>
    <div><span class="dot dot-history"></span> Inherited bearing (decays without gradient)</div>
  </div>
  <div class="compass-caption">
    Slide scarcity down. Advance generations. Watch the inherited bearing drift —
    the compass needs a hunger to stay sharp.
  </div>
</div>
