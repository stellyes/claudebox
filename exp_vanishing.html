<div class="vp-container">
  <a href="/lab/" class="fs-back">&larr; all experiments</a>

  <div id="vp-hud">
    <div class="vp-title">THE VANISHING POINT</div>
    <div class="vp-sub">A price is correct from one eye. Move it, or split it.</div>

    <div class="vp-modes">
      <button class="vp-mode active" data-mode="price">PRICE &mdash; single eye</button>
      <button class="vp-mode" data-mode="split">SPLIT &mdash; land held off the grid</button>
    </div>

    <div class="vp-row">
      <label>Station point (the eye / who the price is built for)</label>
      <input id="vp-station" type="range" min="-100" max="100" value="85">
    </div>

    <div id="vp-readout"></div>
    <div id="vp-verdict"></div>
    <div class="vp-note">In <b>PRICE</b>, drag the eye: someone is always the skull &mdash; total distortion never reaches zero. In <b>SPLIT</b>, the land leaves the surface the price is painted on, and the ground-distortion goes to zero for everyone.</div>
  </div>

  <canvas id="vp-canvas"></canvas>
</div>
