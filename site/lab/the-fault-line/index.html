    <style>
.fl-wrap {

  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'JetBrains Mono', 'Fira Mono', monospace;
  color: #c8d0d8;
  overflow: hidden;
}

#fl-hud {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 640px;

<body>
<script>document.body.classList.add('fullscreen-exp');</script>

<div class="fl-wrap">
  <a href="/lab/" class="fs-back">&larr; all experiments</a>

  <div id="fl-hud">
    <div class="fl-title">The Fault Line</div>
    <div class="fl-subtitle">7-qubit repetition code &mdash; majority vote error correction</div>
    <div class="fl-controls">
      <span class="fl-label">Error rate:</span>
      <input type="range" id="fl-slider" min="0" max="30" step="0.5" value="3">
      <span id="fl-rate">3.0%</span>
    </div>
    <div id="fl-status" class="fl-below">Below threshold &mdash; logical state preserved</div>
    <div class="fl-stats">
      <span>Physical errors this step: <strong id="fl-phys-err">0</strong>/7</span>
      <span>Logical flips: <strong id="fl-log-flips">0</strong></span>
      <span>Steps: <strong id="fl-steps">0</strong></span>
    </div>
  </div>

  <canvas id="fl-canvas"></canvas>

  <div id="fl-footer">
    <div class="fl-qubit-row" id="fl-qubit-display"></div>
    <div class="fl-qubit-label">Physical qubits &mdash; drag slider past the fault line (~12%) to see cascade</div>
  </div>
</div>

<script>
(function() {
  var NUM_PHYS = 7;
  var MAX_HIST = 180;
  var THRESHOLD = 12;

  var errorRate = 3;
  var physBits = [0,0,0,0,0,0,0];
  var logHistory = [];
  var physErrHistory = [];
  var totalLogFlips = 0;
  var totalSteps = 0;
  var lastTs = 0;
  var STEP_MS = 65;

  var canvas = document.getElementById('fl-canvas');
  var ctx = canvas.getContext('2d');
  var slider = document.getElementById('fl-slider');
  var rateDisplay = document.getElementById('fl-rate');
  var statusEl = document.getElementById('fl-status');
  var physErrEl = document.getElementById('fl-phys-err');
  var logFlipsEl = document.getElementById('fl-log-flips');
  var stepsEl = document.getElementById('fl-steps');
  var qubitDisplay = document.getElementById('fl-qubit-display');

  // Build qubit display
  for (var qi = 0; qi < NUM_PHYS; qi++) {
    var d = document.createElement('div');
    d.className = 'fl-qubit zero';
    d.textContent = '0';
    qubitDisplay.appendChild(d);
  }

  function majorityVote(bits) {
    var ones = 0;
    for (var i = 0; i < bits.length; i++) ones += bits[i];
    return ones > bits.length / 2 ? 1 : 0;
  }

  function step() {
    var prevLog = logHistory.length > 0 ? logHistory[logHistory.length - 1] : 0;
    var newBits = physBits.map(function(b) {
      return Math.random() * 100 < errorRate ? 1 - b : b;
    });
    physBits = newBits;

    var logical = majorityVote(physBits);
    var physErrors = physBits.reduce(function(a, b) { return a + b; }, 0);

    logHistory.push(logical);
    physErrHistory.push(physErrors);
    if (logHistory.length > MAX_HIST) { logHistory.shift(); physErrHistory.shift(); }

    if (logical !== prevLog && totalSteps > 0) totalLogFlips++;
    totalSteps++;

    // Update qubit cells
    var cells = qubitDisplay.querySelectorAll('.fl-qubit');
    for (var i = 0; i < NUM_PHYS; i++) {
      cells[i].textContent = physBits[i];
      cells[i].className = 'fl-qubit ' + (physBits[i] === 0 ? 'zero' : 'one');
    }

    physErrEl.textContent = physErrors;
    logFlipsEl.textContent = totalLogFlips;
    stepsEl.textContent = totalSteps;
  }

  function resizeCanvas() {
    var wrap = document.querySelector('.fl-wrap');
    var hud = document.getElementById('fl-hud');
    var footer = document.getElementById('fl-footer');
    var availH = wrap.clientHeight - hud.offsetHeight - footer.offsetHeight - 8;
    canvas.width = Math.min(wrap.clientWidth, 720);
    canvas.height = Math.max(availH, 80);
  }

  function draw() {
    var W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#080c10';
    ctx.fillRect(0, 0, W, H);

    var N = logHistory.length;
    if (N < 2) return;

    var padL = 56, padR = 28, padT = 20, padB = 26;
    var plotW = W - padL - padR;
    var plotH = H - padT - padB;

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (var gi = 0; gi <= 4; gi++) {
      var gy = padT + (gi / 4) * plotH;
      ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(W - padR, gy); ctx.stroke();
    }

    // Physical error heatmap behind waveform
    for (var pi = 0; pi < N; pi++) {
      var px = padL + (pi / MAX_HIST) * plotW;
      var ef = physErrHistory[pi] / NUM_PHYS;
      if (ef > 0) {
        ctx.fillStyle = 'rgba(200,70,70,' + (ef * 0.07) + ')';
        ctx.fillRect(px, padT, (plotW / MAX_HIST) + 1, plotH);
      }
    }

    // Y-axis labels
    var logY0 = padT + plotH * 0.75;
    var logY1 = padT + plotH * 0.25;
    ctx.fillStyle = '#2a3848';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('|1\u27e9', padL - 6, logY1 + 4);
    ctx.fillText('|0\u27e9', padL - 6, logY0 + 4);

    // Logical waveform
    var isAbove = errorRate > THRESHOLD;
    var isNear = !isAbove && errorRate > THRESHOLD * 0.6;
    var lineColor = isAbove ? '#d04040' : (isNear ? '#d09020' : '#28b878');

    ctx.beginPath();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = lineColor;

    for (var li = 0; li < N; li++) {
      var lx = padL + (li / MAX_HIST) * plotW;
      var ly = logHistory[li] === 0 ? logY0 : logY1;
      if (li === 0) {
        ctx.moveTo(lx, ly);
      } else {
        var ply = logHistory[li - 1] === 0 ? logY0 : logY1;
        if (ly !== ply) {
          ctx.lineTo(lx, ply);
          ctx.lineTo(lx, ly);
        } else {
          ctx.lineTo(lx, ly);
        }
      }
    }
    ctx.stroke();

    // Endpoint dot
    var lastLX = padL + ((N - 1) / MAX_HIST) * plotW;
    var lastLY = logHistory[N - 1] === 0 ? logY0 : logY1;
    ctx.beginPath();
    ctx.arc(lastLX, lastLY, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();

    // State labels on right edge
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(40,184,120,0.45)';
    ctx.fillText('|0\u27e9', W - padR + 5, logY0 + 4);
    ctx.fillStyle = 'rgba(200,50,50,0.45)';
    ctx.fillText('|1\u27e9', W - padR + 5, logY1 + 4);

    // Time axis label
    ctx.fillStyle = '#1e2c3a';
    ctx.textAlign = 'center';
    ctx.fillText('time \u2192', padL + plotW / 2, H - 6);

    // Threshold indicator line on slider track (visual only via label)
    ctx.fillStyle = '#2a1818';
    ctx.textAlign = 'right';
    ctx.fillText('\u2191 ~12% threshold', padL + (THRESHOLD / 30) * plotW, padT - 4);
    ctx.strokeStyle = 'rgba(200,80,80,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    var threshX = padL + (THRESHOLD / 30) * plotW;
    ctx.beginPath();
    ctx.moveTo(threshX, padT);
    ctx.lineTo(threshX, padT + plotH);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function updateStatus() {
    var isAbove = errorRate > THRESHOLD;
    var isNear = !isAbove && errorRate > THRESHOLD * 0.6;
    if (isAbove) {
      statusEl.className = 'fl-above';
      statusEl.textContent = 'Above threshold \u2014 cascade: errors accumulate faster than correction';
    } else if (isNear) {
      statusEl.className = 'fl-near';
      statusEl.textContent = 'Approaching threshold \u2014 correction straining';
    } else {
      statusEl.className = 'fl-below';
      statusEl.textContent = 'Below threshold \u2014 logical state preserved';
    }
  }

  slider.addEventListener('input', function() {
    errorRate = parseFloat(this.value);
    rateDisplay.textContent = errorRate.toFixed(1) + '%';
    totalLogFlips = 0;
    totalSteps = 0;
    logHistory = [];
    physErrHistory = [];
    physBits = [0, 0, 0, 0, 0, 0, 0];
    updateStatus();
  });

  window.addEventListener('resize', function() {
    resizeCanvas();
    draw();
  });

  function loop(ts) {
    if (ts - lastTs > STEP_MS) {
      step();
      updateStatus();
      draw();
      lastTs = ts;
    }
    requestAnimationFrame(loop);
  }

  resizeCanvas();
  requestAnimationFrame(loop);
})();
</script>
</body>
