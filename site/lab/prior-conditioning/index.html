    <script>
(function(){var C=document.getElementById('pm');var SYM=['<circle cx="50" cy="50" r="34" fill="currentColor"/>','<circle cx="50" cy="50" r="31" fill="none" stroke="currentColor" stroke-width="7"/><circle cx="50" cy="50" r="9" fill="currentColor"/>','<polygon points="50,10 90,82 10,82" fill="currentColor"/>','<polygon points="50,90 90,18 10,18" fill="currentColor"/>','<rect x="16" y="16" width="68" height="68" fill="currentColor"/>','<polygon points="50,10 90,50 50,90 10,50" fill="currentColor"/>','<rect x="15" y="43" width="70" height="14" fill="currentColor"/><rect x="43" y="15" width="14" height="70" fill="currentColor"/>','<line x1="12" y1="35" x2="88" y2="35" stroke="currentColor" stroke-width="10" stroke-linecap="round"/><line x1="12" y1="65" x2="88" y2="65" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>'];var COND=[[0,7],[2,5],[4,1]];function s(id,sz){sz=sz||90;return'<svg viewBox="0 0 100 100" width="'+sz+'" height="'+sz+'" style="color:#e0e0e0;display:block">'+SYM[id]+'</svg>';}function sfl(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}function buildSeq(){var seq=[];COND.forEach(function(p,ci){for(var i=0;i<6;i++)seq.push({l:p[0],r:p[1],ci:ci});});var cs={};COND.forEach(function(p){cs[p[0]*100+p[1]]=1;cs[p[1]*100+p[0]]=1;});for(var i=0;i<12;i++){var l,r,t=0;do{l=Math.floor(Math.random()*8);r=Math.floor(Math.random()*8);t++;}while((l===r||cs[l*100+r])&&t<60);seq.push({l:l,r:r,ci:-1});}return sfl(seq);}var ph=1,seq=[],pos=0,tests=[],ti=0,sc=0;function buildTests(){tests=COND.map(function(p){var co=p[1];var pool=[0,1,2,3,4,5,6,7].filter(function(x){return x!==co;});return{left:p[0],correct:co,choices:sfl([co].concat(sfl(pool).slice(0,5)))};});}function rp1(){var tot=seq.length,pct=Math.round(((pos+1)/tot)*100),pr=seq[pos]||seq[tot-1];C.innerHTML='<div class="pm-phase"><h1 class="pm-title">Prior Conditioning</h1><p class="pm-sub">Watch each pair. Click NEXT or press Space to advance.</p><div class="pm-pair"><div class="pm-symbox">'+s(pr.l)+'</div><div class="pm-divider"></div><div class="pm-symbox">'+s(pr.r)+'</div></div><div class="pm-bar"><div class="pm-fill" style="width:'+pct+'%"></div></div><div class="pm-count">'+(pos+1)+' / '+tot+'</div><button class="pm-btn" id="nxt">NEXT</button></div>';document.getElementById('nxt').onclick=adv;}function adv(){pos++;if(pos>=seq.length){buildTests();ph=2;}render();}function rp2(){var t=tests[ti];var ch=t.choices.map(function(x){return'<button class="pm-choice" data-s="'+x+'">'+s(x,52)+'</button>';}).join('');C.innerHTML='<div class="pm-phase"><h1 class="pm-title">Recognition</h1><p class="pm-sub">Test '+(ti+1)+' of 3 &mdash; which symbol goes with this one?</p><div class="pm-test-row"><div class="pm-symbox pm-big">'+s(t.left,120)+'</div><div class="pm-arrow">&#8594;</div><div class="pm-choices">'+ch+'</div></div></div>';document.querySelectorAll('.pm-choice').forEach(function(btn){btn.addEventListener('click',function(){var c=parseInt(btn.dataset.s),cor=tests[ti].correct;document.querySelectorAll('.pm-choice').forEach(function(b){b.disabled=true;var x=parseInt(b.dataset.s);if(x===cor)b.classList.add('pm-correct');else if(x===c&&c!==cor)b.classList.add('pm-wrong');});if(c===cor)sc++;setTimeout(function(){ti++;if(ti>=tests.length)ph=3;render();},1100);});});}function rp3(){var pp=COND.map(function(p){return'<div class="pm-result-pair">'+s(p[0],52)+'<span class="pm-arrow-sm">&#8594;</span>'+s(p[1],52)+'</div>';}).join('');C.innerHTML='<div class="pm-phase"><h1 class="pm-title">Score: '+sc+' / 3</h1><p class="pm-sub">These three pairs appeared six times each. The others appeared once.</p><div class="pm-result-pairs">'+pp+'</div><div class="pm-explanation"><p>Your brain learned to predict these pairings without instruction &mdash; because they co-occurred repeatedly. This is prior conditioning: the generative model updates to expect what it has seen together before.</p><p>Soviet space propaganda ran the same loop for fifteen years, pairing rockets with red stars, cosmonauts with Lenin, space achievement with communist ideology. Not argument. Juxtaposition. Repeated until the pairings felt like features of the world, not claims made about it.</p><p class="pm-cite">From: <a href="/blog/apophenia-and-propaganda/">How Propaganda Conditions Pattern Recognition</a></p></div><button class="pm-btn" id="rtr">Try Again</button></div>';document.getElementById('rtr').onclick=function(){seq=buildSeq();pos=0;ti=0;sc=0;ph=1;render();};}function render(){if(ph===1)rp1();else if(ph===2)rp2();else rp3();}seq=buildSeq();render();document.addEventListener('keydown',function(e){if(e.code==='Space'&&ph===1){e.preventDefault();adv();}});})();
    </script>
